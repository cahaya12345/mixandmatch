<ion-header class="ion-no-border">
  <ion-toolbar class="aesthetic-toolbar">
    <div style="display: flex; flex-direction: column; align-items: flex-start; width: 100%; padding: calc(var(--ion-safe-area-top, 0px) + 16px) 20px 8px 20px;">
      <h1 class="aesthetic-title" style="margin: 0; text-align: left;">Ide Outfit</h1>
      <ion-button fill="clear" (click)="navCtrl.navigateRoot('/home')" class="soft-back-btn" style="margin-left: -12px; margin-top: 4px; --padding-start: 12px;">
        <ion-icon name="arrow-back-outline"></ion-icon>
        <ion-label style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; text-transform: capitalize; margin-left: 4px;">Back</ion-label>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="search-container">
    <div class="search-box">
      <ion-icon name="search-outline"></ion-icon>
      <input type="text" placeholder="Cari gaya..." [(ngModel)]="searchQuery" (input)="updateDisplayOutfits()" />
    </div>
  </div>
  <div class="container-paling-luar">
  <div class="header-text">
    <h1>Temukan inspirasi gaya terbaru</h1>
    <p>Gulir ke bawah untuk melihat referensi outfit full-body yang bisa kamu pakai sekarang.</p>
  </div>

  <div class="empty-state" *ngIf="displayOutfits.length === 0">
    <ion-icon name="search-outline"></ion-icon>
    <h3>Tidak Ditemukan</h3>
    <p>Coba gunakan kata kunci lain untuk mencari outfit yang sesuai.</p>
  </div>

  <div class="outfit-grid" *ngIf="displayOutfits.length > 0">
    <button type="button" class="outfit-card" *ngFor="let outfit of displayOutfits; trackBy: trackById" (click)="showOutfitDetails(outfit)">
      <div class="image-container">
        <img [src]="outfit.imageUrl" [alt]="outfit.title" loading="lazy" />
        <div class="badge-category">{{ outfit.category }}</div>
      </div>
      <div class="card-content">
        <h3 class="outfit-title">{{ outfit.title }}</h3>
      </div>
    </button>
  </div>
  </div>
</ion-content>

  <div class="custom-overlay" *ngIf="isModalOpen" (click)="closeOutfitDetails()">
  <div class="overlay-content" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeOutfitDetails()">
      <ion-icon name="close-circle-outline"></ion-icon>
    </button>
    
    <div class="image-preview" *ngIf="selectedOutfit">
      <img [src]="selectedOutfit.imageUrl" />
    </div>
    
    <div class="info-preview" *ngIf="selectedOutfit">
      <h2>{{ selectedOutfit.title }}</h2>
      <p>{{ selectedOutfit.category }}</p>
      <button class="btn-tutup" (click)="closeOutfitDetails()">Tutup</button>
    </div>
  </div>
</div>
