<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text="Kembali"></ion-back-button>
    </ion-buttons>
    <ion-title>Ide Outfit</ion-title>
  </ion-toolbar>
  <div class="search-container">
    <div class="search-box">
      <ion-icon name="search-outline"></ion-icon>
      <input type="text" placeholder="Cari gaya..." [(ngModel)]="searchQuery" (ionInput)="handleInput($event)" />
    </div>
  </div>
</ion-header>

<ion-content>
  <div class="container-paling-luar">
  <div class="header-text">
    <h1>Temukan inspirasi gaya terbaru</h1>
    <p>Gulir ke bawah untuk melihat referensi outfit full-body yang bisa kamu pakai sekarang.</p>
  </div>

  <div class="empty-state" *ngIf="displayOutfits.length === 0">
    <ion-icon name="search-outline"></ion-icon>
    <h3>Tidak Ditemukan</h3>
    <p>Coba gunakan kata kunci lain untuk mencari outfit yang sesuai.</p>
  </div>

  <div class="outfit-grid" *ngIf="displayOutfits.length > 0">
    <button type="button" class="outfit-card" *ngFor="let outfit of displayOutfits" (click)="showOutfitDetails(outfit)">
      <div class="image-container">
        <img [src]="outfit.imageUrl" [alt]="outfit.title" loading="lazy" />
        <div class="badge-category">{{ outfit.category }}</div>
      </div>
      <div class="card-content">
        <h3 class="outfit-title">{{ outfit.title }}</h3>
      </div>
    </button>
  </div>
  </div>
</ion-content>

  <ion-modal [isOpen]="isModalOpen" (didDismiss)="closeOutfitDetails()">
    <ng-template>
      <ion-header class="ion-no-border">
        <ion-toolbar class="transparent-toolbar">
          <ion-buttons slot="end">
            <ion-button (click)="closeOutfitDetails()">
              <ion-icon name="close-circle-outline"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content class="modal-content">
        <div class="result-image-wrapper" *ngIf="selectedOutfit">
          <img [src]="selectedOutfit.imageUrl" [alt]="selectedOutfit.title" class="detail-image" />
        </div>

        <div class="result-details" *ngIf="selectedOutfit">
          <h2>{{ selectedOutfit.title }}</h2>
          <p>Kategori: <strong>{{ selectedOutfit.category }}</strong></p>
          <div class="tags">
            <ion-badge *ngFor="let tag of selectedOutfit.tags">{{ tag }}</ion-badge>
          </div>
          <div class="action-buttons">
            <ion-button expand="block" fill="solid" color="dark" (click)="closeOutfitDetails()">Tutup</ion-button>
          </div>
        </div>
      </ion-content>
    </ng-template>
  </ion-modal>
